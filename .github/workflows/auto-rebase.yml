name: Auto-Rebase PRs
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase:
    name: Rebase Open PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase open PR branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get all open PR branches
          prs=$(gh pr list --state open --json number,headRefName --jq '.[] | "\(.number) \(.headRefName)"')

          if [ -z "$prs" ]; then
            echo "No open PRs to rebase"
            exit 0
          fi

          echo "$prs" | while read -r pr_number branch_name; do
            echo "=== PR #$pr_number ($branch_name) ==="

            # Fetch the branch
            git fetch origin "$branch_name" 2>/dev/null || { echo "Could not fetch $branch_name -- skipping"; continue; }

            # Checkout and attempt rebase
            git checkout "$branch_name" 2>/dev/null || { echo "Could not checkout $branch_name -- skipping"; continue; }

            if git rebase origin/main; then
              echo "Rebase successful -- pushing"
              git push --force-with-lease origin "$branch_name"
              gh pr comment "$pr_number" --body "Auto-rebased onto main by CI."
            else
              echo "Rebase has conflicts -- aborting"
              git rebase --abort
              gh pr comment "$pr_number" --body "Auto-rebase failed -- manual rebase needed (conflicts with main)."
            fi

            # Return to main for next iteration
            git checkout main
          done
